<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MF Pointage">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>Pointage — Motors Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.app{width:100%;max-width:380px;}
.screen{display:none;}
.screen.actif{display:block;}

.logo{text-align:center;margin-bottom:1.5rem;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px;}
.logo-title{font-size:20px;font-weight:900;color:#fff;}
.logo-sub{font-size:12px;color:#64748b;margin-top:3px;}

/* CARTE VEHICULE */
.veh-card{background:#1e293b;border-radius:16px;padding:1.2rem;margin-bottom:1rem;border:1px solid #334155;text-align:center;}
.veh-immat{font-size:26px;font-weight:900;color:#fff;letter-spacing:2px;}
.veh-client{font-size:14px;color:#94a3b8;margin-top:4px;}
.veh-modele{font-size:12px;color:#64748b;margin-top:2px;}

/* EN COURS */
.en-cours{background:#0d1f0d;border:1px solid #22c55e30;border-radius:12px;padding:10px 14px;margin-bottom:1rem;}
.en-cours-title{font-size:11px;font-weight:700;color:#22c55e;text-transform:uppercase;margin-bottom:8px;}
.pt-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #22c55e15;}
.pt-row:last-child{border-bottom:none;}
.pt-prenom{font-size:13px;font-weight:700;color:#fff;}
.pt-depuis{font-size:11px;color:#4ade80;}

/* HISTORIQUE */
.histo{background:#1e293b;border-radius:12px;padding:10px 14px;margin-bottom:1rem;border:1px solid #334155;}
.histo-title{font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;margin-bottom:8px;}
.histo-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #334155;}
.histo-row:last-child{border-bottom:none;}
.histo-prenom{font-size:12px;color:#94a3b8;font-weight:600;}
.histo-duree{font-size:12px;font-weight:700;color:#60a5fa;}

/* BOUTONS PRINCIPAUX */
.btn-group{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem;}
.btn-start{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(34,197,94,0.3);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(239,68,68,0.3);display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-back{background:#1e293b;color:#64748b;border:1.5px solid #334155;padding:12px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;width:100%;}
.btn-submit{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-bottom:10px;}
.btn-submit:disabled{opacity:0.5;pointer-events:none;}

/* FORMULAIRE */
.form-card{background:#1e293b;border-radius:16px;padding:1.2rem;margin-bottom:1rem;border:1px solid #334155;}
.form-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:1rem;text-align:center;}
label{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
input,textarea{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:12px 14px;font-size:15px;font-family:'Inter',sans-serif;color:#fff;margin-bottom:12px;outline:none;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:#3b82f6;}
textarea{min-height:70px;resize:vertical;font-size:13px;}

/* SUCCES */
.succes{text-align:center;padding:1.5rem 1rem;}
.succes-icon{font-size:56px;margin-bottom:1rem;}
.succes-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.succes-title.vert{color:#22c55e;}
.succes-title.rouge{color:#ef4444;}
.succes-duree{font-size:32px;font-weight:900;color:#fff;margin:0.8rem 0;}
.succes-sub{font-size:13px;color:#64748b;line-height:1.6;}

.erreur-msg{background:#1a0808;border:1px solid #ef444440;border-radius:8px;padding:8px 12px;font-size:12px;color:#f87171;margin-bottom:8px;text-align:center;}
.loading{text-align:center;color:#64748b;padding:1.5rem;font-size:13px;}
</style>
</head>
<body>
<div class="app">

  <!-- CHARGEMENT -->
  <div class="screen actif" id="s-loading">
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-title">Motors Factory</div>
      <div class="logo-sub">Chargement...</div>
    </div>
    <div class="loading">Récupération du véhicule...</div>
  </div>

  <!-- ACCUEIL VEHICULE -->
  <div class="screen" id="s-accueil">
    <div class="logo">
      <div class="logo-icon">🔧</div>
      <div class="logo-title">Motors Factory</div>
      <div class="logo-sub">Pointage véhicule</div>
    </div>
    <div class="veh-card">
      <div class="veh-immat" id="v-immat">—</div>
      <div class="veh-client" id="v-client">—</div>
      <div class="veh-modele" id="v-modele">—</div>
    </div>
    <div id="zone-en-cours"></div>
    <div id="zone-histo"></div>
    <div class="btn-group">
      <button class="btn-start" onclick="aller('s-form-start')">▶ Démarrer mon pointage</button>
      <button class="btn-stop" onclick="aller('s-form-stop')">⏹ Terminer mon pointage</button>
    </div>
  </div>

  <!-- FORM DEMARRER -->
  <div class="screen" id="s-form-start">
    <div class="logo">
      <div class="logo-icon">▶️</div>
      <div class="logo-title">Démarrer</div>
      <div class="logo-sub" id="start-immat">—</div>
    </div>
    <div class="form-card">
      <div class="form-title">Votre prénom</div>
      <label>Prénom</label>
      <input type="text" id="start-prenom" placeholder="Ex : Mohamed, Sarah..." autocomplete="given-name"/>
      <button class="btn-submit" id="btn-start-submit" onclick="demarrer()">▶ Commencer le travail</button>
      <button class="btn-back" onclick="aller('s-accueil')">← Retour</button>
    </div>
    <div id="err-start"></div>
  </div>

  <!-- FORM TERMINER -->
  <div class="screen" id="s-form-stop">
    <div class="logo">
      <div class="logo-icon">⏹️</div>
      <div class="logo-title">Terminer</div>
      <div class="logo-sub" id="stop-immat">—</div>
    </div>
    <div class="form-card">
      <div class="form-title">Votre prénom</div>
      <label>Prénom</label>
      <input type="text" id="stop-prenom" placeholder="Ex : Mohamed, Sarah..."/>
      <label>Commentaire (optionnel)</label>
      <textarea id="stop-commentaire" placeholder="Ex : Vidange faite, freins vérifiés..."></textarea>
      <button class="btn-submit" id="btn-stop-submit" onclick="terminer()">⏹ Terminer mon travail</button>
      <button class="btn-back" onclick="aller('s-accueil')">← Retour</button>
    </div>
    <div id="err-stop"></div>
  </div>

  <!-- SUCCES DEMARRER -->
  <div class="screen" id="s-ok-start">
    <div class="succes">
      <div class="succes-icon">✅</div>
      <div class="succes-title vert">Pointage démarré !</div>
      <div class="succes-sub" id="ok-start-txt">—</div>
      <button class="btn-back" style="margin-top:1.5rem;" onclick="recharger()">← Retour au véhicule</button>
    </div>
  </div>

  <!-- SUCCES TERMINER -->
  <div class="screen" id="s-ok-stop">
    <div class="succes">
      <div class="succes-icon">🎉</div>
      <div class="succes-title vert">Travail terminé !</div>
      <div class="succes-duree" id="ok-duree">—</div>
      <div class="succes-sub" id="ok-stop-txt">—</div>
      <button class="btn-back" style="margin-top:1.5rem;" onclick="recharger()">← Retour au véhicule</button>
    </div>
  </div>

  <!-- ERREUR -->
  <div class="screen" id="s-erreur">
    <div class="succes">
      <div class="succes-icon">❌</div>
      <div class="succes-title rouge">Véhicule introuvable</div>
      <div class="succes-sub">Ce QR code ne correspond à aucun véhicule.<br>Contactez le responsable.</div>
    </div>
  </div>

</div>
<script>
const API="https://script.google.com/macros/s/AKfycbwBRfaIwhNpa6cZtnO_vTQ1iEO_8zE4jCnSoyTQBDNadtJ-_cI39h9fiVE2exvjgg/exec";
let vehiculeId=null,vehiculeData=null,pointagesData=[];

function aller(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('actif');});
  document.getElementById(id).classList.add('actif');
  if(id==='s-form-start'){
    document.getElementById('start-immat').textContent=vehiculeData?vehiculeData['Immatriculation']:'';
    document.getElementById('start-prenom').value='';
    document.getElementById('err-start').innerHTML='';
  }
  if(id==='s-form-stop'){
    document.getElementById('stop-immat').textContent=vehiculeData?vehiculeData['Immatriculation']:'';
    document.getElementById('stop-prenom').value='';
    document.getElementById('stop-commentaire').value='';
    document.getElementById('err-stop').innerHTML='';
  }
}

function getParam(p){return new URLSearchParams(window.location.search).get(p);}

function formatDuree(min){
  if(!min||min<=0)return'0 min';
  if(min<60)return min+' min';
  return Math.floor(min/60)+'h'+(min%60>0?Math.floor(min%60)+'min':'');
}

function afficherVehicule(){
  document.getElementById('v-immat').textContent=vehiculeData['Immatriculation']||'—';
  document.getElementById('v-client').textContent=vehiculeData['Client']||'—';
  document.getElementById('v-modele').textContent=vehiculeData['Modèle']||'—';

  // En cours
  const enCours=pointagesData.filter(function(p){return !p['Heure fin'];});
  if(enCours.length>0){
    let h='<div class="en-cours"><div class="en-cours-title">🟢 En cours ('+enCours.length+')</div>';
    enCours.forEach(function(p){
      const debut=String(p['Heure début']||'');
      const heure=debut.length>10?debut.substring(11,16):debut;
      h+='<div class="pt-row"><div class="pt-prenom">'+p['Prénom employé']+'</div><div class="pt-depuis">Depuis '+heure+'</div></div>';
    });
    h+='</div>';
    document.getElementById('zone-en-cours').innerHTML=h;
  } else {
    document.getElementById('zone-en-cours').innerHTML='';
  }

  // Historique terminés
  const termines=pointagesData.filter(function(p){return p['Heure fin']&&p['Durée (min)'];});
  if(termines.length>0){
    let h='<div class="histo"><div class="histo-title">📋 Travaux effectués</div>';
    termines.slice(-5).reverse().forEach(function(p){
      h+='<div class="histo-row"><div class="histo-prenom">'+p['Prénom employé']+'</div><div class="histo-duree">'+formatDuree(parseInt(p['Durée (min)'])||0)+'</div></div>';
    });
    h+='</div>';
    document.getElementById('zone-histo').innerHTML=h;
  } else {
    document.getElementById('zone-histo').innerHTML='';
  }
}

async function charger(){
  vehiculeId=getParam('v');
  if(!vehiculeId){aller('s-erreur');return;}
  try{
    const res=await fetch(API+'?action=vehicule&v='+vehiculeId+'&t='+Date.now());
    const data=await res.json();
    if(!data.vehicule){aller('s-erreur');return;}
    vehiculeData=data.vehicule;
    pointagesData=data.pointages||[];
    afficherVehicule();
    aller('s-accueil');
  }catch(e){aller('s-erreur');}
}

function recharger(){charger();}

async function demarrer(){
  const prenom=document.getElementById('start-prenom').value.trim();
  if(!prenom){document.getElementById('err-start').innerHTML='<div class="erreur-msg">Entre ton prénom !</div>';return;}
  
  const btn=document.getElementById('btn-start-submit');
  btn.disabled=true;btn.textContent='⏳ En cours...';
  
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'demarrer',vehiculeId:vehiculeId,prenom:prenom})});
    const data=await res.json();
    const heure=data.heureDebut?String(data.heureDebut).substring(11,16):'';
    document.getElementById('ok-start-txt').textContent=prenom+' — '+vehiculeData['Immatriculation']+'\nDémarré à '+heure;
    aller('s-ok-start');
  }catch(e){
    document.getElementById('err-start').innerHTML='<div class="erreur-msg">Erreur. Réessaie.</div>';
  }
  btn.disabled=false;btn.textContent='▶ Commencer le travail';
}

async function terminer(){
  const prenom=document.getElementById('stop-prenom').value.trim();
  const commentaire=document.getElementById('stop-commentaire').value.trim();
  if(!prenom){document.getElementById('err-stop').innerHTML='<div class="erreur-msg">Entre ton prénom !</div>';return;}
  
  // Chercher pointage en cours pour ce prénom
  const enCours=pointagesData.find(function(p){
    return !p['Heure fin']&&String(p['Prénom employé']||'').toLowerCase()===prenom.toLowerCase();
  });
  
  if(!enCours){
    document.getElementById('err-stop').innerHTML='<div class="erreur-msg">Aucun pointage en cours pour <strong>'+prenom+'</strong>.<br>Tu n\'as pas encore démarré sur ce véhicule.</div>';
    return;
  }
  
  const btn=document.getElementById('btn-stop-submit');
  btn.disabled=true;btn.textContent='⏳ En cours...';
  
  try{
    const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'terminer',idPointage:enCours['ID Pointage'],commentaire:commentaire})});
    const data=await res.json();
    document.getElementById('ok-duree').textContent=formatDuree(data.dureeMin||0);
    document.getElementById('ok-stop-txt').textContent=prenom+' — '+vehiculeData['Immatriculation'];
    aller('s-ok-stop');
  }catch(e){
    document.getElementById('err-stop').innerHTML='<div class="erreur-msg">Erreur. Réessaie.</div>';
  }
  btn.disabled=false;btn.textContent='⏹ Terminer mon travail';
}

charger();
</script>
</body>
</html>
