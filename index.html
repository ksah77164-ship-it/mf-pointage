<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MF Pointage">
<meta name="theme-color" content="#0f172a">
<title>Pointage — Motors Factory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.app{width:100%;max-width:360px;}
.screen{display:none;}.screen.actif{display:block;}
.logo{text-align:center;margin-bottom:1.2rem;}
.logo-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 8px;}
.ic-bleu{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
.ic-vert{background:linear-gradient(135deg,#22c55e,#16a34a);}
.ic-rouge{background:linear-gradient(135deg,#ef4444,#dc2626);}
.ic-orange{background:linear-gradient(135deg,#f59e0b,#d97706);}
.ic-violet{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.logo-title{font-size:18px;font-weight:900;color:#fff;}
.logo-sub{font-size:12px;color:#64748b;margin-top:2px;}
.veh-card{background:#1e293b;border-radius:14px;padding:1rem;margin-bottom:1rem;border:1px solid #334155;text-align:center;}
.veh-immat{font-size:24px;font-weight:900;color:#fff;letter-spacing:2px;}
.veh-client{font-size:13px;color:#94a3b8;margin-top:3px;}
.veh-modele{font-size:11px;color:#64748b;margin-top:2px;}
.btn-group{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.btn-main{color:#fff;border:none;padding:16px;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Inter',sans-serif;width:100%;}
.btn-main.vert{background:linear-gradient(135deg,#22c55e,#16a34a);}
.btn-main.rouge{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn-main.orange{background:linear-gradient(135deg,#f59e0b,#d97706);}
.btn-main.violet{background:linear-gradient(135deg,#8b5cf6,#7c3aed);}
.btn-main.gris{background:#334155;color:#94a3b8;}
.btn-main:disabled{opacity:0.4;pointer-events:none;}
.form-card{background:#1e293b;border-radius:14px;padding:1rem;margin-bottom:1rem;border:1px solid #334155;}
.step-label{font-size:11px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.svc-btn{padding:14px 6px;border-radius:10px;border:2px solid #334155;font-size:12px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;background:#0f172a;color:#475569;}
.svc-btn.sel-C{background:#1a1200;border-color:#fbbf24;color:#fbbf24;}
.svc-btn.sel-M{background:#001020;border-color:#60a5fa;color:#60a5fa;}
.svc-btn.sel-P{background:#1a0015;border-color:#f472b6;color:#f472b6;}
.svc-icon{font-size:20px;display:block;margin-bottom:3px;}
.code-display{display:flex;justify-content:center;gap:10px;margin-bottom:16px;}
.code-digit{width:48px;height:56px;background:#0f172a;border:2px solid #334155;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;}
.code-digit.filled{border-color:#3b82f6;background:#001020;}
.code-digit.error{border-color:#ef4444;background:#1a0808;}
.clavier{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.key{background:#1e293b;border:1.5px solid #334155;border-radius:10px;padding:16px 8px;font-size:20px;font-weight:800;color:#fff;cursor:pointer;text-align:center;font-family:'Inter',sans-serif;}
.key:active{background:#334155;}
.key.del{font-size:16px;color:#64748b;}
.key.vide{background:transparent;border-color:transparent;cursor:default;}
.emp-trouve{background:#0d1f0d;border:1px solid #22c55e40;border-radius:10px;padding:10px 14px;margin-bottom:10px;text-align:center;display:none;}
.emp-nom{font-size:16px;font-weight:900;color:#22c55e;}
.emp-svc-txt{font-size:11px;color:#475569;margin-top:2px;}
.multi-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.multi-btn{padding:14px 16px;border-radius:10px;border:2px solid #334155;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;background:#0f172a;color:#475569;flex:1;min-width:100px;text-align:center;}
.multi-btn.sel-C{background:#1a1200;border-color:#fbbf24;color:#fbbf24;}
.multi-btn.sel-M{background:#001020;border-color:#60a5fa;color:#60a5fa;}
.multi-btn.sel-P{background:#1a0015;border-color:#f472b6;color:#f472b6;}
.motif-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.motif-btn{padding:14px 8px;border-radius:10px;border:2px solid #334155;font-size:12px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;text-align:center;background:#0f172a;color:#475569;}
.motif-btn.sel{background:#1a1200;border-color:#f59e0b;color:#f59e0b;}
.motif-icon{font-size:22px;display:block;margin-bottom:3px;}
textarea{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Inter',sans-serif;color:#fff;outline:none;min-height:60px;resize:vertical;margin-bottom:10px;}
.err-msg{background:#1a0808;border:1px solid #ef444440;border-radius:8px;padding:8px 12px;font-size:12px;color:#f87171;margin-bottom:8px;text-align:center;}
.succes{text-align:center;padding:2rem 0.5rem;}
.succes-icon{font-size:64px;margin-bottom:1rem;}
.succes-titre{font-size:22px;font-weight:900;margin-bottom:6px;}
.succes-titre.vert{color:#22c55e;}
.succes-titre.orange{color:#f59e0b;}
.succes-titre.violet{color:#8b5cf6;}
.succes-duree{font-size:36px;font-weight:900;color:#fff;margin:1rem 0;}
.succes-sub{font-size:13px;color:#64748b;line-height:1.8;white-space:pre-line;}
.succes-info{font-size:12px;color:#334155;margin-top:1.5rem;padding:10px;background:#1e293b;border-radius:10px;}
.loading{text-align:center;color:#64748b;padding:2rem;}
</style>
</head>
<body>
<div class="app">

<div class="screen actif" id="s-loading">
  <div class="logo"><div class="logo-icon ic-bleu">🔧</div><div class="logo-title">Motors Factory</div><div class="logo-sub">Chargement...</div></div>
  <div class="loading">⏳</div>
</div>

<div class="screen" id="s-accueil">
  <div class="logo"><div class="logo-icon ic-bleu">🔧</div><div class="logo-title">Motors Factory</div><div class="logo-sub">Pointage véhicule</div></div>
  <div class="veh-card">
    <div class="veh-immat" id="v-immat">—</div>
    <div class="veh-client" id="v-client">—</div>
    <div class="veh-modele" id="v-modele">—</div>
  </div>
  <div class="btn-group">
    <button class="btn-main vert" onclick="initAction('start')">▶  Démarrer</button>
    <button class="btn-main orange" onclick="initAction('pause')">⏸  Pause</button>
    <button class="btn-main violet" onclick="initAction('reprendre')">▶▶  Reprendre</button>
    <button class="btn-main rouge" onclick="initAction('stop')">⏹  Terminer</button>
  </div>
</div>

<div class="screen" id="s-action">
  <div class="logo">
    <div class="logo-icon ic-bleu" id="a-icon">▶️</div>
    <div class="logo-title" id="a-titre">Action</div>
    <div class="logo-sub" id="a-immat">—</div>
  </div>
  <div class="form-card">
    <div class="step-label" id="step1-label">① Votre service</div>
    <div class="svc-grid" id="svc-zone">
      <button class="svc-btn" id="svc-C" onclick="choisirSvc('Carrosserie')"><span class="svc-icon">🚗</span>Carrosserie</button>
      <button class="svc-btn" id="svc-M" onclick="choisirSvc('Mécanique')"><span class="svc-icon">🔧</span>Mécanique</button>
      <button class="svc-btn" id="svc-P" onclick="choisirSvc('Peinture')"><span class="svc-icon">🎨</span>Peinture</button>
    </div>
    <div id="code-zone" style="display:none;">
      <div class="step-label">② Code employé</div>
      <div class="code-display">
        <div class="code-digit" id="cd-0">_</div>
        <div class="code-digit" id="cd-1">_</div>
        <div class="code-digit" id="cd-2">_</div>
        <div class="code-digit" id="cd-3">_</div>
      </div>
      <div class="emp-trouve" id="emp-trouve">
        <div class="emp-nom" id="emp-nom-txt">—</div>
        <div class="emp-svc-txt" id="emp-svc-txt">—</div>
      </div>
      <div class="clavier">
        <button class="key" onclick="taper('1')">1</button>
        <button class="key" onclick="taper('2')">2</button>
        <button class="key" onclick="taper('3')">3</button>
        <button class="key" onclick="taper('4')">4</button>
        <button class="key" onclick="taper('5')">5</button>
        <button class="key" onclick="taper('6')">6</button>
        <button class="key" onclick="taper('7')">7</button>
        <button class="key" onclick="taper('8')">8</button>
        <button class="key" onclick="taper('9')">9</button>
        <button class="key vide"></button>
        <button class="key" onclick="taper('0')">0</button>
        <button class="key del" onclick="effacer()">⌫</button>
      </div>
    </div>
    <div id="multi-zone" style="display:none;">
      <div class="step-label">③ Votre service</div>
      <div class="multi-grid" id="multi-grid"></div>
    </div>
    <div id="motif-zone" style="display:none;">
      <div class="step-label">③ Motif de pause</div>
      <div class="motif-grid">
        <button class="motif-btn" id="motif-dej" onclick="choisirMotif('Pause dejeuner')"><span class="motif-icon">🍽️</span>Déjeuner</button>
        <button class="motif-btn" id="motif-pce" onclick="choisirMotif('Attente piece')"><span class="motif-icon">🔩</span>Attente pièce</button>
      </div>
    </div>
    <div id="comment-zone" style="display:none;">
      <div class="step-label">③ Commentaire (optionnel)</div>
      <textarea id="stop-comment" placeholder="Ex: Vidange faite..."></textarea>
    </div>
    <button class="btn-main vert" id="btn-valider" style="display:none;" onclick="valider()">Valider</button>
  </div>
  <div id="err-zone"></div>
</div>

<div class="screen" id="s-ok">
  <div class="succes">
    <div class="succes-icon" id="ok-icon">✅</div>
    <div class="succes-titre vert" id="ok-titre">OK</div>
    <div class="succes-duree" id="ok-duree" style="display:none;">—</div>
    <div class="succes-sub" id="ok-sub">—</div>
    <div class="succes-info">🔒 Pour une nouvelle action, rescannez le QR code.</div>
  </div>
</div>

<div class="screen" id="s-erreur">
  <div class="succes">
    <div class="succes-icon">❌</div>
    <div class="succes-titre rouge">Véhicule introuvable</div>
    <div class="succes-sub">Contactez le responsable.</div>
  </div>
</div>

</div>
<script>
var API = "https://script.google.com/macros/s/AKfycbwBRfaIwhNpa6cZtnO_vTQ1iEO_8zE4jCnSoyTQBDNadtJ-_cI39h9fiVE2exvjgg/exec";
var vehiculeId = null;
var veh = null;
var pts = [];
var emps = [];
var actionMode = null;
var svcChoisi = null;
var empChoisi = null;
var motifChoisi = null;
var codeActuel = "";

var ACTIONS = {
  start: {icon:"▶️", titre:"Démarrer", icClass:"ic-vert", btnClass:"vert", btnTxt:"▶ Commencer le travail"},
  pause: {icon:"⏸️", titre:"Pause", icClass:"ic-orange", btnClass:"orange", btnTxt:"⏸ Mettre en pause"},
  reprendre: {icon:"▶️", titre:"Reprendre", icClass:"ic-violet", btnClass:"violet", btnTxt:"▶▶ Reprendre"},
  stop: {icon:"⏹️", titre:"Terminer", icClass:"ic-rouge", btnClass:"rouge", btnTxt:"⏹ Terminer"}
};

var SVC_CLASS = {Carrosserie:"sel-C", Mecanique:"sel-M", Peinture:"sel-P"};
function getSvcClass(s) {
  if(s === "Carrosserie") return "sel-C";
  if(s === "Mécanique") return "sel-M";
  if(s === "Peinture") return "sel-P";
  return "";
}
var SVC_ICONS = {Carrosserie:"🚗", Mecanique:"🔧", Peinture:"🎨"};
function getSvcIcon(s) {
  if(s === "Carrosserie") return "🚗";
  if(s === "Mécanique") return "🔧";
  if(s === "Peinture") return "🎨";
  return "🔧";
}

function getParam(p) {
  return new URLSearchParams(window.location.search).get(p);
}

function fmt(min) {
  if(!min || min <= 0) return "0 min";
  if(min < 60) return Math.round(min) + " min";
  return Math.floor(min/60) + "h" + (min%60 > 0 ? Math.floor(min%60) + "m" : "");
}

function afficher(id) {
  var screens = document.querySelectorAll(".screen");
  for(var i = 0; i < screens.length; i++) {
    screens[i].classList.remove("actif");
  }
  document.getElementById(id).classList.add("actif");
}

function initAction(mode) {
  actionMode = mode;
  svcChoisi = null;
  empChoisi = null;
  motifChoisi = null;
  codeActuel = "";

  var a = ACTIONS[mode];
  var icon = document.getElementById("a-icon");
  icon.textContent = a.icon;
  icon.className = "logo-icon " + a.icClass;
  document.getElementById("a-titre").textContent = a.titre;
  document.getElementById("a-immat").textContent = veh ? veh["Immatriculation"] : "";

  // Reset tout
  document.getElementById("svc-C").className = "svc-btn";
  document.getElementById("svc-M").className = "svc-btn";
  document.getElementById("svc-P").className = "svc-btn";
  document.getElementById("code-zone").style.display = "none";
  document.getElementById("multi-zone").style.display = "none";
  document.getElementById("motif-zone").style.display = "none";
  document.getElementById("comment-zone").style.display = "none";
  document.getElementById("btn-valider").style.display = "none";
  document.getElementById("emp-trouve").style.display = "none";
  document.getElementById("err-zone").innerHTML = "";
  majAffichageCode();

  // Pour pause/reprendre/stop : pas besoin de choisir service d'abord
  // On affiche directement le clavier
  if(mode === "pause" || mode === "reprendre" || mode === "stop") {
    document.getElementById("svc-zone").style.display = "none";
    document.getElementById("step1-label").style.display = "none";
    document.getElementById("code-zone").style.display = "block";
  } else {
    document.getElementById("svc-zone").style.display = "grid";
    document.getElementById("step1-label").style.display = "block";
  }

  afficher("s-action");
}

function choisirSvc(svc) {
  svcChoisi = svc;
  document.getElementById("svc-C").className = "svc-btn" + (svc === "Carrosserie" ? " sel-C" : "");
  document.getElementById("svc-M").className = "svc-btn" + (svc === "Mécanique" ? " sel-M" : "");
  document.getElementById("svc-P").className = "svc-btn" + (svc === "Peinture" ? " sel-P" : "");
  codeActuel = "";
  empChoisi = null;
  majAffichageCode();
  document.getElementById("emp-trouve").style.display = "none";
  document.getElementById("multi-zone").style.display = "none";
  document.getElementById("motif-zone").style.display = "none";
  document.getElementById("comment-zone").style.display = "none";
  document.getElementById("btn-valider").style.display = "none";
  document.getElementById("err-zone").innerHTML = "";
  document.getElementById("code-zone").style.display = "block";
}

function majAffichageCode() {
  for(var i = 0; i < 4; i++) {
    var el = document.getElementById("cd-" + i);
    el.textContent = i < codeActuel.length ? "●" : "_";
    el.className = "code-digit" + (i < codeActuel.length ? " filled" : "");
  }
}

function taper(chiffre) {
  if(codeActuel.length >= 4) return;
  codeActuel += chiffre;
  majAffichageCode();
  if(codeActuel.length === 4) verifierCode();
}

function effacer() {
  if(codeActuel.length === 0) return;
  codeActuel = codeActuel.slice(0, -1);
  empChoisi = null;
  document.getElementById("emp-trouve").style.display = "none";
  document.getElementById("btn-valider").style.display = "none";
  majAffichageCode();
}

function getServices(emp) {
  return String(emp.service || "").split(",").map(function(s) { return s.trim(); }).filter(Boolean);
}

function verifierCode() {
  // Chercher employé par code uniquement
  var emp = null;
  for(var i = 0; i < emps.length; i++) {
    if(String(emps[i].code) === codeActuel) {
      emp = emps[i];
      break;
    }
  }

  if(!emp) {
    for(var j = 0; j < 4; j++) {
      document.getElementById("cd-" + j).className = "code-digit error";
    }
    setTimeout(function() {
      codeActuel = "";
      majAffichageCode();
    }, 800);
    return;
  }

  empChoisi = emp;
  var services = getServices(emp);
  document.getElementById("emp-nom-txt").textContent = emp.prenom;
  document.getElementById("emp-svc-txt").textContent = services.join(" & ");
  document.getElementById("emp-trouve").style.display = "block";
  document.getElementById("err-zone").innerHTML = "";

  // Si start avec multi-services → choisir le service
  if(actionMode === "start" && services.length > 1) {
    var grid = document.getElementById("multi-grid");
    var html = "";
    for(var k = 0; k < services.length; k++) {
      var s = services[k];
      html += '<button class="multi-btn" id="ms-' + k + '" onclick="choisirMultiSvc(\'' + s + '\')">'
        + '<span style="font-size:20px;display:block;margin-bottom:3px;">' + getSvcIcon(s) + '</span>' + s + '</button>';
    }
    grid.innerHTML = html;
    document.getElementById("multi-zone").style.display = "block";
    document.getElementById("btn-valider").style.display = "none";
    return;
  }

  // 1 seul service pour start
  if(actionMode === "start" && services.length === 1) {
    svcChoisi = services[0];
  }

  continuerApresCode();
}

function choisirMultiSvc(svc) {
  svcChoisi = svc;
  var btns = document.querySelectorAll("[id^='ms-']");
  for(var i = 0; i < btns.length; i++) {
    btns[i].className = "multi-btn";
  }
  // Trouver le bon bouton
  var grid = document.getElementById("multi-grid");
  var allBtns = grid.querySelectorAll("button");
  for(var j = 0; j < allBtns.length; j++) {
    if(allBtns[j].textContent.indexOf(svc) !== -1) {
      allBtns[j].className = "multi-btn " + getSvcClass(svc);
      break;
    }
  }
  continuerApresCode();
}

function choisirMotif(motif) {
  motifChoisi = motif;
  document.getElementById("motif-dej").className = "motif-btn" + (motif === "Pause dejeuner" ? " sel" : "");
  document.getElementById("motif-pce").className = "motif-btn" + (motif === "Attente piece" ? " sel" : "");
  afficherBtnValider();
}

function getPtEnCours() {
  if(!empChoisi) return null;
  for(var i = 0; i < pts.length; i++) {
    var p = pts[i];
    if(String(p["Prénom employé"] || "").toLowerCase() === empChoisi.prenom.toLowerCase() && !p["Heure fin"]) {
      return p;
    }
  }
  return null;
}

function continuerApresCode() {
  var pt = getPtEnCours();
  var enPause = pt && String(pt["En pause"] || "") === "Oui";
  var actif = pt && !enPause;

  document.getElementById("err-zone").innerHTML = "";

  if(actionMode === "start" && pt) {
    document.getElementById("err-zone").innerHTML = '<div class="err-msg">' + empChoisi.prenom + ' a déjà un pointage en cours !</div>';
    return;
  }
  if(actionMode === "pause" && !actif) {
    document.getElementById("err-zone").innerHTML = '<div class="err-msg">' + empChoisi.prenom + ' n\'est pas en cours de travail.</div>';
    return;
  }
  if(actionMode === "reprendre" && !enPause) {
    document.getElementById("err-zone").innerHTML = '<div class="err-msg">' + empChoisi.prenom + ' n\'est pas en pause.</div>';
    return;
  }
  if(actionMode === "stop" && !pt) {
    document.getElementById("err-zone").innerHTML = '<div class="err-msg">' + empChoisi.prenom + ' n\'a pas de pointage en cours.</div>';
    return;
  }

  // Récupérer service du pointage en cours pour pause/stop/reprendre
  if(pt && (actionMode === "pause" || actionMode === "stop" || actionMode === "reprendre")) {
    svcChoisi = pt["Service"] || svcChoisi;
  }

  if(actionMode === "pause") {
    document.getElementById("motif-zone").style.display = "block";
  } else if(actionMode === "stop") {
    document.getElementById("comment-zone").style.display = "block";
    afficherBtnValider();
  } else {
    afficherBtnValider();
  }
}

function afficherBtnValider() {
  var a = ACTIONS[actionMode];
  var btn = document.getElementById("btn-valider");
  btn.style.display = "block";
  btn.textContent = a.btnTxt;
  btn.className = "btn-main " + a.btnClass;
}

function postData(body, callback) {
  fetch(API, {method:"POST", body:JSON.stringify(body)})
    .then(function(res) { return res.json(); })
    .then(function(data) { callback(null, data); })
    .catch(function(err) { callback(err, null); });
}

function valider() {
  if(!empChoisi) return;
  var btn = document.getElementById("btn-valider");
  btn.disabled = true;
  btn.textContent = "⏳ En cours...";

  var pt = getPtEnCours();

  if(actionMode === "start") {
    postData({action:"demarrer", vehiculeId:vehiculeId, prenom:empChoisi.prenom, service:svcChoisi}, function(err, data) {
      if(err) { showErr(btn); return; }
      var heure = String(data.heureDebut || "").substring(11, 16);
      showSucces("✅", "vert", "Pointage démarré !", empChoisi.prenom + " — " + svcChoisi + "\n" + veh["Immatriculation"] + "\nDémarré à " + heure, 0);
    });
  } else if(actionMode === "pause") {
    if(!motifChoisi) {
      document.getElementById("err-zone").innerHTML = '<div class="err-msg">Choisis un motif !</div>';
      btn.disabled = false;
      btn.textContent = ACTIONS[actionMode].btnTxt;
      return;
    }
    postData({action:"pause", idPointage:pt["ID Pointage"], motif:motifChoisi}, function(err, data) {
      if(err) { showErr(btn); return; }
      showSucces("⏸️", "orange", "Pause enregistrée", empChoisi.prenom + "\n" + motifChoisi + "\n" + veh["Immatriculation"], 0);
    });
  } else if(actionMode === "reprendre") {
    postData({action:"reprendre", idPointage:pt["ID Pointage"]}, function(err, data) {
      if(err) { showErr(btn); return; }
      showSucces("▶️", "violet", "Reprise !", empChoisi.prenom + "\n" + veh["Immatriculation"], 0);
    });
  } else if(actionMode === "stop") {
    var commentaire = document.getElementById("stop-comment").value;
    postData({action:"terminer", idPointage:pt["ID Pointage"], commentaire:commentaire}, function(err, data) {
      if(err) { showErr(btn); return; }
      showSucces("🎉", "vert", "Travail terminé !", empChoisi.prenom + " — " + svcChoisi + "\n" + veh["Immatriculation"], data.dureeMin || 0);
    });
  }
}

function showErr(btn) {
  document.getElementById("err-zone").innerHTML = '<div class="err-msg">Erreur réseau. Réessaie.</div>';
  btn.disabled = false;
  btn.textContent = ACTIONS[actionMode].btnTxt;
}

function showSucces(icon, classe, titre, sub, duree) {
  document.getElementById("ok-icon").textContent = icon;
  document.getElementById("ok-titre").textContent = titre;
  document.getElementById("ok-titre").className = "succes-titre " + classe;
  document.getElementById("ok-sub").textContent = sub;
  var el = document.getElementById("ok-duree");
  if(duree > 0) {
    el.style.display = "block";
    el.textContent = fmt(duree);
  } else {
    el.style.display = "none";
  }
  afficher("s-ok");
}

function charger() {
  vehiculeId = getParam("v");
  if(!vehiculeId) { afficher("s-erreur"); return; }
  fetch(API + "?action=vehicule&v=" + vehiculeId + "&t=" + Date.now())
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if(!data.vehicule) { afficher("s-erreur"); return; }
      veh = data.vehicule;
      pts = data.pointages || [];
      emps = data.employes || [];
      document.getElementById("v-immat").textContent = veh["Immatriculation"] || "—";
      document.getElementById("v-client").textContent = veh["Client"] || "—";
      document.getElementById("v-modele").textContent = veh["Modèle"] || "—";
      afficher("s-accueil");
    })
    .catch(function() { afficher("s-erreur"); });
}

charger();
</script>
